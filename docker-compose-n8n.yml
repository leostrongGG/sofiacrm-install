# =============================================================
# n8n — Automação de workflows (modo queue)
#
# Usa a rede sofiacrm_net, PostgreSQL e Redis já existentes.
# Dados persistidos no banco n8n_queue (criado automaticamente).
#
# Chamadas internas de webhook (dentro da rede Docker):
#   http://n8n_webhook:5678/webhook/SEU_PATH
#
# Para instalar manualmente sem o script:
#   docker compose -f docker-compose-n8n.yml --env-file .env up -d
# =============================================================

x-n8n-env: &n8n-env
  DB_TYPE: postgresdb
  DB_POSTGRESDB_DATABASE: n8n_queue
  DB_POSTGRESDB_HOST: sofiacrm-pgvector
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_USER: ${POSTGRES_USER}
  DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
  N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
  N8N_HOST: ${N8N_DOMAIN}
  N8N_EDITOR_BASE_URL: https://${N8N_DOMAIN}/
  N8N_PROTOCOL: https
  NODE_ENV: production
  WEBHOOK_URL: https://${N8N_DOMAIN}/
  EXECUTIONS_MODE: queue
  EXECUTIONS_TIMEOUT: "600"
  EXECUTIONS_TIMEOUT_MAX: "600"
  QUEUE_BULL_REDIS_HOST: sofiacrm-redis
  QUEUE_BULL_REDIS_PORT: "6379"
  QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
  QUEUE_BULL_REDIS_DB: "2"
  NODE_FUNCTION_ALLOW_EXTERNAL: moment,lodash,moment-with-locales
  EXECUTIONS_DATA_PRUNE: "true"
  EXECUTIONS_DATA_MAX_AGE: "336"
  GENERIC_TIMEZONE: America/Sao_Paulo
  TZ: America/Sao_Paulo

services:
  n8n_editor:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_editor
    command: start
    restart: always
    environment:
      <<: *n8n-env
    networks:
      - sofiacrm_net

  n8n_webhook:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_webhook
    command: webhook
    restart: always
    environment:
      <<: *n8n-env
    networks:
      - sofiacrm_net

  n8n_worker:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_worker
    command: worker --concurrency=10
    restart: always
    environment:
      <<: *n8n-env
    networks:
      - sofiacrm_net

networks:
  sofiacrm_net:
    external: true
    name: sofiacrm_net
